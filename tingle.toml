# tingle measuring itself
[ranges.python]
include = ["src/**/*.py", "tests/**/*.py"]
default = true

[[metrics]]
name = "noqa-comments"
type = "regex_count"
pattern = '#\s*noqa'

[[metrics]]
name = "type-ignores"
type = "regex_count"
pattern = '#\s*type:\s*ignore'

[[metrics]]
name = "ruff-ignores"
type = "toml_list_length"
key = "tool.ruff.lint.ignore"

[[metrics]]
name = "ruff-per-file-ignores"
type = "toml_list_length"
key = "tool.ruff.lint.per-file-ignores"

[[metrics]]
name = "pylint-disables"
type = "ini_list_length"
file = ".pylintrc"
section = "MESSAGES CONTROL"
option = "disable"

[[metrics]]
name = "python-loc"
type = "line_count"

[[metrics]]
name = "python-files"
type = "file_count"
