name: Docs

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# never cancel an in-flight deploy; queue instead
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - run: mise run docs:build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # only main publishes; pull requests stop at the strict build above
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # scoped to this job: the PR build must not hold Pages write / OIDC
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
